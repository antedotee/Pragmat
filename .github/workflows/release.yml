name: release

# Releasing = create and push a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds Pragmat for macOS (Apple Silicon + Intel), Windows, and Linux and
# attaches the installers to a GitHub Release (created as a draft to review/publish).
on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'   # Apple Silicon (.dmg / .app)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'   # Intel (.dmg / .app)
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'   # Linux (.deb / .AppImage / .rpm)
            args: ''
          - platform: 'windows-latest' # Windows (.msi / .exe)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pragmat ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          releaseBody: |
            ## Pragmat ${{ github.ref_name }}

            Download the installer for your platform below.

            ### macOS (unsigned)
            This build isn't notarized, so macOS will say *"Pragmat is damaged"* on first open.
            After dragging it to Applications, run once in Terminal:
            ```
            xattr -cr /Applications/Pragmat.app
            ```
            Apple Silicon → `*_aarch64.dmg`, Intel → `*_x64.dmg`.

            ### Windows (unsigned)
            SmartScreen may warn — click **More info → Run anyway**.

            ### Linux
            Use the `.AppImage` (`chmod +x` then run) or the `.deb`.
